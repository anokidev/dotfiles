[colors]
background = #282A2E
background-alt = #373B41
foreground = #C5C8C6
primary = #ffa229
secondary = #8ABEB7
alert = #A54242
disabled = #707880

[bar/example]
width = 100%
height = 24pt
radius = 6

; dpi = 96

background = ${colors.background}
foreground = ${colors.foreground}

line-size = 3pt

border-size = 4pt
border-color = #00000000

padding-left = 0
padding-right = 1

module-margin = 1

separator = |
separator-foreground = ${colors.disabled}

font-0 = MesloLGS NF;2

modules-left = xworkspaces
modules-right = xkeyboard pulseaudio cpu memory filesystem wlan eth date powermenu

cursor-click = pointer
cursor-scroll = ns-resize

enable-ipc = true

; tray-position = right

; wm-restack = generic
; wm-restack = bspwm
; wm-restack = i3

; override-redirect = true

[module/xworkspaces]
type = internal/xworkspaces

label-active = %name%
label-active-background = ${colors.background-alt}
label-active-underline= ${colors.primary}
label-active-padding = 1

label-occupied = %name%
label-occupied-padding = 1

label-urgent = %name%
label-urgent-background = ${colors.alert}
label-urgent-padding = 1

label-empty = %name%
label-empty-foreground = ${colors.disabled}
label-empty-padding = 1

[module/xwindow]
type = internal/xwindow
label = %title:0:60:...%

[module/filesystem]
type = internal/fs
interval = 25

mount-0 = /

label-mounted = %{F#F0C674}%mountpoint%%{F-} %percentage_used%%
label-mounted-foreground = ${colors.primary}

label-unmounted = %mountpoint% not mounted
label-unmounted-foreground = ${colors.disabled}
click-right = gnome-system-monitor -f

[module/pulseaudio]
type = internal/pulseaudio

format-volume-prefix = "VOL "
format-volume-prefix-foreground = ${colors.primary}
format-volume = <label-volume>

label-volume = %percentage%%

label-muted = muted
label-muted-foreground = ${colors.disabled}
click-right = pavucontrol

[module/xkeyboard]
type = internal/xkeyboard
blacklist-0 = num lock

label-layout = %layout%
label-layout-foreground = ${colors.primary}

label-indicator-padding = 2
label-indicator-margin = 1
label-indicator-foreground = ${colors.background}
label-indicator-background = ${colors.secondary}

[module/memory]
type = internal/memory
interval = 2
format-prefix = "RAM "
format-prefix-foreground = ${colors.primary}
label = %percentage_used:2%%
click-right = gnome-system-monitor -r

[module/cpu]
type = internal/cpu
interval = 2
format-prefix = "CPU "
format-prefix-foreground = ${colors.primary}
label = %percentage:2%%
click-right = gnome-system-monitor -r

[network-base]
type = internal/network
interval = 5
format-connected = <label-connected>
format-disconnected = <label-disconnected>
label-disconnected = %{F#F0C674}%ifname%%{F#707880} Disconnected

[module/wlan]
inherit = network-base
interface-type = wireless
label-connected = %{F#F0C674}%ifname%%{F-} Connected

[module/eth]
inherit = network-base
interface-type = wired
label-connected = %{F#F0C674}%ifname%%{F-} Connected

[module/date]
type = internal/date
interval = 1

date = %H:%M
date-alt = %Y-%m-%d %H:%M:%S

label = %date%
label-foreground = ${colors.primary}

[settings]
screenchange-reload = true
pseudo-transparency = true

; vim:ft=dosini
;
[module/powermenu]
type = custom/menu

expand-right = true

format-background = ${colors.background}

label-open = " ‚ŹĽ "
label-open-foreground = #ffffff
label-close = " Cancel "
label-close-foreground = ${colors.secondary}
label-separator = |
label-separator-foreground = ${colors.foreground-alt}

label-padding = 1

menu-0-0 = " Shutdown "
menu-0-0-exec = menu-open-1
menu-0-1 = " Reboot "
menu-0-1-exec = menu-open-2
menu-0-2 = " Sleep "
menu-0-2-exec = menu-open-3
menu-0-3 = " Logout "
menu-0-3-exec = menu-open-4

menu-1-0 = " Yes "
menu-1-0-exec = poweroff
menu-1-1 = " No "
menu-1-1-exec = menu-open-0

menu-2-0 = " Yes " 
menu-2-0-exec = reboot
menu-2-1 = " No "
menu-2-1-exec = menu-open-0

menu-3-0 = " Yes "
menu-3-0-exec = sleep
menu-3-1 = " No "
menu-3-1-exec = menu-open-0

menu-4-0 = " Yes "
menu-4-0-exec = openbox --exit
menu-4-1 = " No "
menu-4-1-exec = menu-open-0
